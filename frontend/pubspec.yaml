name: ed_verse
description: A Flutter MVVM app for EdVerse Education ERP with Provider and Theme support.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.7.0 <4.0.0'
  flutter: ^3.29.2

dependencies:
  cached_network_image: ^3.4.1
  flutter:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^9.2.4
  flutter_svg: ^2.1.0
  go_router: ^15.1.2
  google_fonts: ^6.2.1
  intl: ^0.20.2
  provider: ^6.1.2
  shared_preferences: ^2.5.2
  # Chart libraries
  fl_chart: ^0.69.0
  # Responsive design support
  responsive_framework: ^1.5.1
  # Platform detection for web/mobile
  universal_html: ^2.2.4
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_launcher_icons: '^0.14.3'
  flutter_test:
    sdk: flutter
  intl_translation: ^0.20.1

flutter:
  uses-material-design: true
  assets:
    - assets/lang/en.json
    - assets/lang/hi.json
    - assets/images/
    - assets/images/icons/
    - assets/images/card_icons/
    - assets/images/icons/language/
    - assets/images/icons/navbar/
    - assets/images/icons/checkbox/
    - assets/font/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/font/Outfit-Regular.ttf
        - asset: assets/font/Outfit-Medium.ttf
        - asset: assets/font/Outfit-SemiBold.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: 'assets/images/app_logo.png'
  remove_alpha_ios: true
